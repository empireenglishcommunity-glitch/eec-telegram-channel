# MACAL Empire — Kohya SS training hyperparameters (SDXL style LoRA)
#
# Values here match the recommendations in
# docs/MACAL-EMPIRE-IMAGE-GEN-INFRASTRUCTURE.md Section 5.3:
#   - LoRA rank 32-64 for SDXL (using 32 — smaller file, faster, sufficient
#     for a style LoRA; character LoRAs typically want higher rank, styles don't)
#   - Learning rate ~1e-4 starting point
#   - 1500-2000 total steps for a 40-80 image style dataset
#
# This file is passed to sd-scripts' sdxl_train_network.py via --config_file.
# See RUN_TRAINING.md for the exact command.

[model]
pretrained_model_name_or_path = "/kaggle/working/ComfyUI/models/checkpoints/sd_xl_base_1.0.safetensors"

[network]
network_module = "networks.lora"
network_dim = 32
network_alpha = 16
# network_alpha = dim/2 is a standard safe default that balances training
# speed against overfitting risk for a style LoRA.

[optimizer]
optimizer_type = "AdamW8bit"
# 8-bit AdamW keeps optimizer state VRAM low — important on a 16GB T4/P100.
learning_rate = 1e-4
lr_scheduler = "cosine_with_restarts"
lr_warmup_steps = 100

[training]
train_batch_size = 1
max_train_steps = 1800
# 1800 sits in the 1500-2000 recommended range. With num_repeats=10 and a
# ~60-image dataset (60 x 10 = 600 images/epoch), this is roughly 3 epochs —
# see TRAINING-GUIDE.md for how to recompute this if your curated count differs.
save_every_n_steps = 300
# Saves a checkpoint every 300 steps so you can compare samples across
# training progress and pick the best checkpoint rather than only the last one
# (DATASET-SPEC.md Section 5.3: "more steps is not automatically better").
save_state = true
# save_state (in addition to save_every_n_steps above) saves FULL training
# state (optimizer, step count) every checkpoint, not just the LoRA weights.
# This is what makes crash-recovery possible: train_supervisor.sh can pass
# --resume pointing at the latest "*-state" directory and continue training
# from the exact step it crashed at, instead of restarting from step 0.
# Not using save_last_n_steps_state to auto-prune old state dirs — Kaggle's
# disk is large enough for our ~60-image dataset's handful of state saves,
# and keeping them all avoids depending on an argument this project hasn't
# explicitly verified against the installed sd-scripts version.
mixed_precision = "fp16"
gradient_checkpointing = true
# gradient_checkpointing trades a bit of speed for a large VRAM reduction —
# necessary headroom on a 16GB card training at 1024px.
xformers = true
# Memory-efficient attention — significant VRAM savings, minimal speed cost.

[sdxl]
no_half_vae = true
# SDXL's VAE is numerically unstable in pure fp16 in some environments;
# keeping it in fp32 avoids black/NaN image artifacts during sample generation.

[output]
output_dir = "/kaggle/working/macal_empire_lora_output"
output_name = "macalempire_style_sdxl"
save_model_as = "safetensors"

[sampling]
sample_every_n_steps = 300
sample_prompts = "/kaggle/working/sample_prompts.txt"
# Generates preview images at each checkpoint so you can visually judge
# quality progress without leaving the training session — see RUN_TRAINING.md
# for how sample_prompts.txt is created.
