# MACAL Empire — Kohya SS dataset configuration (SDXL LoRA)
#
# This tells sd-scripts where the training images live and how to read
# captions. Matches the output of image-gen/dataset/prepare_dataset.py exactly:
# numbered NNNN.png + NNNN.txt pairs in a single flat folder.
#
# `num_repeats` controls how many times each image is shown per epoch —
# see TRAINING-GUIDE.md for why 10 is the starting recommendation for a
# ~40-80 image style dataset.

[general]
shuffle_caption = false
caption_extension = ".txt"
keep_tokens = 1
# keep_tokens = 1 protects the trigger word ("macalempire style" — always the
# first "token group" before the first comma) from being shuffled/dropped
# during caption augmentation. Do not lower this to 0.

[[datasets]]
resolution = 1024
batch_size = 1
# batch_size stays at 1 on Kaggle's free T4/P100 (16GB VRAM) — see
# TRAINING-GUIDE.md VRAM notes if you have more VRAM available and want speed.

  [[datasets.subsets]]
  image_dir = "/kaggle/working/macal_empire_dataset/curated"
  num_repeats = 10
  # 10 repeats x ~40-80 images = 400-800 effective images/epoch, giving the
  # 1500-2000 total training steps recommended in DATASET-SPEC.md across a
  # small number of epochs. Adjust if your final curated count differs a lot
  # from the 40-80 target — see TRAINING-GUIDE.md for the exact formula.
